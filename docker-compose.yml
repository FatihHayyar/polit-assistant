services:
  postgres:
    image: postgres:17
    container_name: polit-assistant-db
    environment:
      POSTGRES_DB: polit_assistant
      POSTGRES_USER: polit
      POSTGRES_PASSWORD: polit_dev_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backup:/backup
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polit -d polit_assistant"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: polit-assistant-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/polit_assistant
      SPRING_DATASOURCE_USERNAME: polit
      SPRING_DATASOURCE_PASSWORD: polit_dev_password
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8081:8080"

volumes:
  postgres_data: