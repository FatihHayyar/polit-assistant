name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: polit_assistant_test
          POSTGRES_USER: polit
          POSTGRES_PASSWORD: polit_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U polit -d polit_assistant_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Run tests
        run: ./mvnw clean verify
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/polit_assistant_test
          SPRING_DATASOURCE_USERNAME: polit
          SPRING_DATASOURCE_PASSWORD: polit_test_password

      - name: Build Docker image
        run: docker build -t polit-assistant:ci .