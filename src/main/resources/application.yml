spring:
  application:
    name: polit-assistant

  datasource:
    url: jdbc:postgresql://localhost:5432/polit_assistant
    username: polit
    password: polit_dev_password

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
openparldata:
  base-url: https://api.openparldata.ch

notification:
  teams:
    webhook-url:

classification:
  rules:
    ENERGY:
      - energie
      - strom
      - elektrizität
      - solar
      - photovoltaik
      - wind
      - wasserkraft

    BIODIVERSITY:
      - biodiversität
      - artenvielfalt
      - schutzgebiet
      - ökosystem
      - wald
      - insekten

    WATER:
      - wasser
      - gewässer
      - fluss
      - see
      - abwasser
      - renaturierung

    AGRICULTURE:
      - landwirtschaft
      - pestizid
      - boden
      - tierhaltung
      - dünger

    SPATIAL_PLANNING:
      - raumplanung
      - bauzone
      - verdichtung
      - siedlung
      - landschaftsschutz

    CLIMATE:
      - klima
      - co2
      - treibhausgas
      - emission
      - klimaschutz

    MOBILITY:
      - verkehr
      - mobilität
      - öffentlicher verkehr
      - öv
      - bahn
      - veloverkehr
      - velo

    WASTE:
      - abfall
      - recycling
      - plastik
      - kunststoff
      - kreislaufwirtschaft